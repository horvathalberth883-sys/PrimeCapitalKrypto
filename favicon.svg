<svg viewBox="0 0 32 32" height="32" width="32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient y2="1" x2="1" y1="0" x1="0" id="bg">
      <stop stop-color="#111008" offset="0%"></stop>
      <stop stop-color="#080808" offset="100%"></stop>
    </linearGradient>
    <linearGradient y2="1" x2="0" y1="0" x1="0" id="gold">
      <stop stop-color="#F0D97A" offset="0%"></stop>
      <stop stop-color="#E0C46A" offset="45%"></stop>
      <stop stop-color="#A07830" offset="100%"></stop>
    </linearGradient>
    <filter height="200%" width="200%" y="-50%" x="-50%" id="glow">
      <feGaussianBlur result="blur" stdDeviation="0.8"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>
  
  
  <rect fill="url(#bg)" rx="6" height="32" width="32"></rect>
  
  
  <ellipse opacity="0.09" fill="#E0C46A" ry="7.5" rx="12" cy="18.5" cx="16"></ellipse>
  
  
  <g filter="url(#glow)">
    
    <rect fill="url(#gold)" rx="1.5" height="4.5" width="22" y="20" x="5"></rect>
    
    
    <polygon fill="url(#gold)" points="5,20 7,12 11.5,16 16,8 20.5,16 25,12 27,20"></polygon>
    
    
    <circle opacity="0.65" fill="#111008" r="1.3" cy="22" cx="10.5"></circle>
    <circle opacity="0.65" fill="#111008" r="1.3" cy="22" cx="16"></circle>
    <circle opacity="0.65" fill="#111008" r="1.3" cy="22" cx="21.5"></circle>
    
    
    <circle fill="#FFEEAA" r="1.6" cy="9" cx="16"></circle>
    <circle fill="#FFEEAA" r="1.1" cy="12" cx="7.8"></circle>
    <circle fill="#FFEEAA" r="1.1" cy="12" cx="24.2"></circle>
    
    
    <polygon opacity="0.35" fill="#FAE8B5" points="6.5,19.5 7.5,13 11,16.5 9.5,20"></polygon>
